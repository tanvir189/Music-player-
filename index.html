<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamim Tazim Music</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: rgba(26, 28, 36, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --primary-glow: rgba(99, 102, 241, 0.35);
            --text-primary: #ffffff;
            --text-secondary: #818cf8; /* indigo-400 */
            --text-dim: rgba(255, 255, 255, 0.4);
            --accent-indigo: #6366f1;
            --accent-violet: #8b5cf6;
            --glass-blur: blur(32px);
        }

        /* Ambient background orbs for cosmic depth */
        .bg-glow-1 {
            position: fixed;
            top: -15%;
            left: -15%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.22) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            filter: blur(100px);
            animation: orbFloatOne 20s infinite alternate ease-in-out;
        }

        .bg-glow-2 {
            position: fixed;
            bottom: -15%;
            right: -15%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.18) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            filter: blur(100px);
            animation: orbFloatTwo 25s infinite alternate ease-in-out;
        }

        @keyframes orbFloatOne {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.1); }
        }

        @keyframes orbFloatTwo {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-50px, -40px) scale(1.15); }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 24px 16px;
        }

        /* Main Container setup */
        .app-container {
            width: 100%;
            max-width: 1024px;
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 32px;
            z-index: 10;
        }

        @media (max-width: 820px) {
            .app-container {
                grid-template-columns: 1fr;
                gap: 24px;
                max-width: 480px;
            }
        }

        /* Translucent Immersive Glassmorphic Cards */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.65), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            padding: 32px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Branding section */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .brand-title {
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-title-upper {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-secondary);
            opacity: 0.85;
        }

        .brand-title-lower {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo-icon {
            width: 24px;
            height: 24px;
            fill: url(#musicGrad-icon-root);
        }

        .offline-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Dynamic Vinyl disk display and ambient glow behind it */
        .album-art-wrapper {
            margin: 20px 0 28px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .album-art-wrapper::before {
            content: '';
            position: absolute;
            width: 240px;
            height: 240px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 50%;
            filter: blur(48px);
            z-index: 0;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .vinyl-container {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1c24 0%, #0d0e12 100%);
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.61), 0 0 0 1px rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        /* Stylized groove lines */
        .vinyl-container::before {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 
                inset 0 0 0 10px #111217,
                inset 0 0 0 11px rgba(255, 255, 255, 0.02),
                inset 0 0 0 22px #111217,
                inset 0 0 0 23px rgba(255, 255, 255, 0.02),
                inset 0 0 0 36px #111217,
                inset 0 0 0 37px rgba(255, 255, 255, 0.02),
                inset 0 0 0 48px #111217,
                inset 0 0 0 49px rgba(255, 255, 255, 0.01);
            pointer-events: none;
        }

        .vinyl-center {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--primary-gradient);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* Spindle hole inner look */
        .vinyl-center::before {
            content: '';
            position: absolute;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(255, 255, 255, 0.25);
            z-index: 2;
        }

        /* Vinyl spindle hole */
        .vinyl-center::after {
            content: '';
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
            z-index: 3;
        }

        /* Dynamic wave visualization overlapping center */
        .vinyl-wave-visual {
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, rgba(99, 102, 241, 0.4) 0%, rgba(139, 92, 246, 0.4) 100%);
            filter: blur(1px);
            opacity: 0.7;
            z-index: 1;
        }

        /* Vinyl Rotation Animation */
        @keyframes rotateVinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .vinyl-playing {
            animation: rotateVinyl 8s linear infinite;
        }

        /* Vinyl pulsing background shadow */
        .pulse-layer {
            position: absolute;
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: var(--primary-gradient);
            opacity: 0;
            z-index: -1;
            transition: all 0.5s ease;
        }

        .vinyl-playing + .pulse-layer {
            animation: recordPulse 2.5s infinite ease-in-out;
        }

        @keyframes recordPulse {
            0% { transform: scale(1); opacity: 0; }
            50% { transform: scale(1.12); opacity: 0.2; }
            100% { transform: scale(1.24); opacity: 0; }
        }

        /* Track Info Display */
        .track-details-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .song-title-wrapper {
            width: 100%;
            overflow: hidden;
            position: relative;
            height: 32px;
            margin-bottom: 6px;
        }

        .song-title {
            font-size: 1.35rem;
            font-weight: 700;
            white-space: nowrap;
            display: inline-block;
            color: var(--text-primary);
            width: 100%;
            text-align: center;
            letter-spacing: -0.02em;
        }

        /* Marquee style for extra long names */
        .scroll-marquee {
            display: inline-block;
            animation: marquee 14s linear infinite;
            text-align: left;
            width: auto;
        }

        @keyframes marquee {
            0% { transform: translate3d(50%, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .track-artist {
            font-size: 0.88rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Dynamic Equalizer Bar Visuals */
        .equalizer-visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 36px;
            margin-bottom: 28px;
        }

        .eq-bar {
            width: 4px;
            height: 4px;
            background-color: var(--accent-indigo);
            border-radius: 2px;
            transition: height 0.15s ease;
        }

        .eq-bar:nth-child(even) {
            background-color: var(--accent-violet);
        }

        /* Custom Seek Bar / Progress Bar */
        .progress-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }

        .timeline-slider-wrapper {
            position: relative;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 99px;
            cursor: pointer;
        }

        .timeline-progress {
            height: 100%;
            background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 99px;
            width: 0%;
            position: relative;
        }

        /* Handle slider thumb visually */
        .timeline-slider-wrapper:hover .timeline-thumb,
        .timeline-slider-wrapper:active .timeline-thumb {
            opacity: 1;
            transform: translateY(-50%) scale(1);
        }

        .timeline-thumb {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0.8);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 0 10px var(--primary-glow);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }

        .time-box {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* Premium Controls styling */
        .controls-wrapper {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 28px;
            padding: 0 12px;
        }

        .ctrl-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
            position: relative;
        }

        .btn-secondary {
            width: 44px;
            height: 44px;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid transparent;
        }

        .btn-secondary:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
        }

        /* Toggle Active Styles */
        .btn-secondary.active-toggle {
            color: var(--text-primary);
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.2);
        }

        .btn-secondary.active-toggle::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent-indigo);
            box-shadow: 0 0 4px var(--accent-indigo);
        }

        .btn-media {
            width: 52px;
            height: 52px;
            color: rgba(255, 255, 255, 0.75);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .btn-media:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            transform: scale(1.08);
        }

        .btn-media:active {
            transform: scale(0.92);
        }

        /* Master play pause circle style */
        .btn-play-pause {
            width: 76px;
            height: 76px;
            background: var(--primary-gradient);
            color: #ffffff;
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.35);
            border: 1.5px solid rgba(255, 255, 255, 0.18);
        }

        .btn-play-pause:hover {
            box-shadow: 0 10px 35px rgba(99, 102, 241, 0.55);
            transform: scale(1.06);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-play-pause:active {
            transform: scale(0.92);
        }

        /* Volume & Sound custom line */
        .volume-controls-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .vol-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s;
        }

        .vol-btn:hover {
            color: var(--text-primary);
        }

        .volume-slider-wrapper {
            flex-grow: 1;
            position: relative;
            height: 4px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 99px;
            cursor: pointer;
        }

        .volume-active-level {
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 99px;
            width: 75%; /* default sound level */
        }

        .volume-slider-wrapper:hover .vol-thumb {
            opacity: 1;
        }

        .vol-thumb {
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
        }

        /* Playlist Screen Right Panel - Bento Grid Next style */
        .playlist-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .playlist-title-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .playlist-title {
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.60);
        }

        .track-count-badge {
            font-size: 0.7rem;
            background: rgba(99, 102, 241, 0.15);
            color: var(--text-secondary);
            padding: 3px 8px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Custom Search bar */
        .search-field-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        .search-field-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: var(--text-dim);
            pointer-events: none;
        }

        .search-input-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            outline: none;
            padding: 12px 14px 12px 42px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.88rem;
            transition: all 0.25s;
        }

        .search-input-box:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
        }

        /* Song Import Panel button */
        .import-btn-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--primary-gradient);
            color: #ffffff;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 16px;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            margin-bottom: 20px;
        }

        .import-btn-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.55);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .import-btn-label:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* File input itself is hidden */
        .hidden-file-input {
            display: none;
        }

        /* Playlist Scroll area */
        .songs-scroll-viewport {
            flex-grow: 1;
            overflow-y: auto;
            max-height: 290px;
            padding-right: 4px;
        }

        /* Custom scrollbar to match theme */
        .songs-scroll-viewport::-webkit-scrollbar {
            width: 5px;
        }

        .songs-scroll-viewport::-webkit-scrollbar-track {
            background: transparent;
        }

        .songs-scroll-viewport::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
        }

        .songs-scroll-viewport::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        @media (max-width: 820px) {
            .songs-scroll-viewport {
                max-height: 220px;
            }
        }

        /* Single Song list node (Bento Card Style) */
        .song-row-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 12px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .song-row-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateX(2px);
        }

        .song-row-item.current-active-row {
            background: rgba(99, 102, 241, 0.12);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.05);
        }

        .row-left-content {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
            flex-grow: 1;
        }

        .active-sound-animation {
            width: 14px;
            height: 14px;
            display: none;
            align-items: flex-end;
            gap: 2px;
        }

        .song-row-item.current-active-row .active-sound-animation {
            display: flex;
        }

        .song-row-item.current-active-row .active-sound-animation.media-playing-bar span {
            animation: miniPulse 0.8s ease-in-out infinite alternate;
        }

        .active-sound-animation span {
            width: 2.5px;
            height: 100%;
            background: var(--accent-indigo);
            border-radius: 1px;
        }

        .active-sound-animation span:nth-child(1) { height: 60%; animation-delay: -0.2s !important; }
        .active-sound-animation span:nth-child(2) { height: 100%; animation-delay: -0.4s !important; }
        .active-sound-animation span:nth-child(3) { height: 40%; }

        @keyframes miniPulse {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(1); }
        }

        .sequential-index {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-dim);
            width: 18px;
            text-align: center;
        }

        .song-row-item.current-active-row .sequential-index {
            display: none;
        }

        .row-track-details {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-right: 8px;
        }

        .row-track-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-row-item.current-active-row .row-track-title {
            color: #818cf8; /* text-indigo-400 */
        }

        .row-track-meta {
            font-size: 0.72rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-right-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .track-time-duration {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .track-delete-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .track-delete-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.12);
        }

        /* Empty playlist fallback state */
        .empty-playlist-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 38px 12px;
            flex-grow: 1;
        }

        .empty-icon-capsule {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            color: var(--text-dim);
        }

        .empty-text-tip {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .empty-sub-tip {
            font-size: 0.72rem;
            color: var(--text-dim);
            max-width: 220px;
            line-height: 1.4;
        }

        /* SVG icon sizing helper */
        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
            display: inline-block;
        }

        .btn-play-pause .icon {
            width: 28px;
            height: 28px;
        }
    </style>
</head>
<body>

    <!-- Gradient Ambient Orbs -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="app-container">
        
        <!-- PLAYER DECK - LEFT PORTION -->
        <main class="glass-card">
            <!-- Branding Header -->
            <div class="brand-header">
                <div class="brand-title">
                    <span class="brand-title-upper">Now Playing</span>
                    <span class="brand-title-lower">
                        <svg class="brand-logo-icon" viewBox="0 0 24 24">
                            <defs>
                                <linearGradient id="musicGrad-icon-root" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#6366f1" />
                                    <stop offset="100%" stop-color="#8b5cf6" />
                                </linearGradient>
                            </defs>
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h6V3h-8z"/>
                        </svg>
                        Tamim Tazim Music
                    </span>
                </div>
                <div class="offline-tag">Local</div>
            </div>

            <!-- Dynamic Rotating Vinyl Album Art -->
            <div class="album-art-wrapper">
                <div class="vinyl-container" id="vinyl-art">
                    <div class="vinyl-center">
                        <div class="vinyl-wave-visual"></div>
                    </div>
                </div>
                <div class="pulse-layer"></div>
            </div>

            <!-- Track Meta Block -->
            <div class="track-details-display">
                <div class="song-title-wrapper">
                    <h2 class="song-title" id="display-title">No track loaded</h2>
                </div>
                <p class="track-artist" id="display-artist">Import local tracks below</p>
            </div>

            <!-- Dynamic Equalizer wave visual feedback -->
            <div class="equalizer-visualizer" id="equalizer-stage">
                <!-- 12 Equalizer bars inside -->
                <div class="eq-bar" style="height: 10%"></div>
                <div class="eq-bar" style="height: 15%"></div>
                <div class="eq-bar" style="height: 8%"></div>
                <div class="eq-bar" style="height: 25%"></div>
                <div class="eq-bar" style="height: 12%"></div>
                <div class="eq-bar" style="height: 4%"></div>
                <div class="eq-bar" style="height: 18%"></div>
                <div class="eq-bar" style="height: 30%"></div>
                <div class="eq-bar" style="height: 14%"></div>
                <div class="eq-bar" style="height: 22%"></div>
                <div class="eq-bar" style="height: 10%"></div>
                <div class="eq-bar" style="height: 6%"></div>
            </div>

            <!-- Custom Seekbar Node -->
            <div class="progress-container">
                <div class="timeline-slider-wrapper" id="timeline-interactive">
                    <div class="timeline-progress" id="playback-bar">
                        <div class="timeline-thumb"></div>
                    </div>
                </div>
                <div class="time-box">
                    <span id="current-timestamp">00:00</span>
                    <span id="total-duration-timestamp">00:00</span>
                </div>
            </div>

            <!-- Playback Control Center -->
            <div class="controls-wrapper">
                <!-- Shuffle Track Toggle -->
                <button class="ctrl-btn btn-secondary" id="shuffle-toggle" title="Shuffle Playback">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4.05 18.53l1.42 1.41L17.96 7.46l2.04 2.04V4h-5.5zm.35 9.41l-1.42 1.41 2.54 2.54L14.5 20h5.5v-5.5l-2.04 2.04-3.11-3.13z"/>
                    </svg>
                </button>

                <!-- Previous Track Button -->
                <button class="ctrl-btn btn-media" id="prev-track" title="Previous Song">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>

                <!-- Dual Play/Pause dynamic button -->
                <button class="ctrl-btn btn-play-pause" id="play-pause-master" title="Play">
                    <!-- Default Play SVG icon -->
                    <svg class="icon" viewBox="0 0 24 24" id="play-symbol-svg">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <!-- Pause SVG icon (hidden by default) -->
                    <svg class="icon" viewBox="0 0 24 24" id="pause-symbol-svg" style="display: none;">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>

                <!-- Next Track Button -->
                <button class="ctrl-btn btn-media" id="next-track" title="Next Song">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6z"/>
                    </svg>
                </button>

                <!-- Repeat Modes System Toggle -->
                <button class="ctrl-btn btn-secondary" id="repeat-toggle" title="Repeat (Off)">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                    </svg>
                </button>
            </div>

            <!-- Volume integration control row -->
            <div class="volume-controls-box">
                <button class="vol-btn" id="volume-icon-mute" title="Mute Volume">
                    <svg class="icon" id="vol-high" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <svg class="icon" id="vol-mute" viewBox="0 0 24 24" style="display: none;">
                        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                    </svg>
                </button>
                <div class="volume-slider-wrapper" id="volume-interactive">
                    <div class="volume-active-level" id="volume-bar">
                        <div class="vol-thumb" id="volume-slider-thumb"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- PLAYLIST QUEUE / DETAILED LIBRARY VIEW - RIGHT PORTION -->
        <section class="glass-card">
            <div class="playlist-header">
                <div class="playlist-title-box">
                    <h3 class="playlist-title">Music Queue</h3>
                    <span class="track-count-badge" id="library-count">0 tracks</span>
                </div>
                <!-- Mini Option to clear queue quickly -->
                <button class="track-delete-btn" id="clear-queue-action" title="Clear Music Queue" style="display: none;">
                    <svg class="icon" style="width: 18px; height: 18px;" viewBox="0 0 24 24">
                        <path d="M15 16h4v2h-4zm0-8h7v2h-7zm0 4h6v2h-6zM3 18c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2V8H3v10zm2-8h6v8H5V10zm2.5-6l1-1h3l1 1H15v2H2V4h5.5z"/>
                    </svg>
                </button>
            </div>

            <!-- Styled Import trigger button -->
            <label for="local-music-importer" class="import-btn-label">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
                </svg>
                Import Music Files
            </label>
            <input type="file" id="local-music-importer" class="hidden-file-input" accept="audio/*" multiple />

            <!-- Track Filter / Search Bar -->
            <div class="search-field-wrapper" id="search-filter-container" style="display: none;">
                <svg viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" class="search-input-box" id="search-tracks-box" placeholder="Filter imported songs..." />
            </div>

            <!-- Queue Scroll Node -->
            <div class="songs-scroll-viewport" id="songs-list-container">
                <!-- Fallback empty state shown when queue is blank -->
                <div class="empty-playlist-stage" id="empty-state-capsule">
                    <div class="empty-icon-capsule">
                        <svg class="icon" style="width: 28px; height: 28px;" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15.92c-.02.03-.06.06-.09.08H11v-2h2v1.92zm2.03-5.42l-.9.92C12.4 14 12 14.5 12 15.5h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.03 2.58z"/>
                        </svg>
                    </div>
                    <p class="empty-text-tip">No music imported</p>
                    <p class="empty-sub-tip">Click "Import Music Files" to add custom local .mp3 or .wav files from your system or device directory.</p>
                </div>
            </div>
        </section>

    </div>

    <!-- MAIN CORE INTEGRATION SCRIPTS -->
    <script>
        // Core Audio Element Engine
        const audioplayer = new Audio();
        let trackQueue = [];
        let filteredQueue = [];
        let currentTrackIdx = -1;
        let isVolumeMuted = false;
        let lastCachedVolume = 0.75;
        let repeatModeState = 0; // 0 = off, 1 = repeat all, 2 = repeat single track
        let isShuffleOn = false;
        let eqAnimInterval = null;

        // References to visual elements
        const fileImporter = document.getElementById('local-music-importer');
        const playPauseBtn = document.getElementById('play-pause-master');
        const prevBtn = document.getElementById('prev-track');
        const nextBtn = document.getElementById('next-track');
        const shuffleBtn = document.getElementById('shuffle-toggle');
        const repeatBtn = document.getElementById('repeat-toggle');
        const playSymbol = document.getElementById('play-symbol-svg');
        const pauseSymbol = document.getElementById('pause-symbol-svg');

        const vinylArt = document.getElementById('vinyl-art');
        const displayTitle = document.getElementById('display-title');
        const displayArtist = document.getElementById('display-artist');

        const trackerSlider = document.getElementById('timeline-interactive');
        const trackerProgress = document.getElementById('playback-bar');
        const currentTimestampText = document.getElementById('current-timestamp');
        const totalDurationText = document.getElementById('total-duration-timestamp');

        const volMuteBtn = document.getElementById('volume-icon-mute');
        const volSlider = document.getElementById('volume-interactive');
        const volProgressBar = document.getElementById('volume-bar');
        const volMuteSvg = document.getElementById('vol-mute');
        const volHighSvg = document.getElementById('vol-high');

        const songsListWrapper = document.getElementById('songs-list-container');
        const emptyStateCapsule = document.getElementById('empty-state-capsule');
        const searchInput = document.getElementById('search-tracks-box');
        const searchContainer = document.getElementById('search-filter-container');
        const clearQueueAction = document.getElementById('clear-queue-action');
        const libCountBadge = document.getElementById('library-count');
        const equalizerStage = document.getElementById('equalizer-stage');

        // Set Default Volume
        audioplayer.volume = lastCachedVolume;

        // Parse human-readable timestamps (mm:ss) from raw seconds
        function structureTimeStrings(rawSeconds) {
            if (isNaN(rawSeconds) || !isFinite(rawSeconds)) return "00:00";
            const floorMins = Math.floor(rawSeconds / 60);
            const remainingSecs = Math.floor(rawSeconds % 60);
            const stringMins = floorMins.toString().padStart(2, '0');
            const stringSecs = remainingSecs.toString().padStart(2, '0');
            return `${stringMins}:${stringSecs}`;
        }

        // Parse File title - clean up undesirable suffix extensions
        function parseCleanTitle(fileName) {
            return fileName.replace(/\.(mp3|wav|m4a|ogg|aac|flac|webm)$/i, '');
        }

        // Render Equalizer bar heights randomly
        function updateEqualizerAnimation() {
            const bars = document.querySelectorAll('.eq-bar');
            bars.forEach(bar => {
                if (audioplayer.paused) {
                    bar.style.height = '4px';
                } else {
                    const randomPct = Math.floor(Math.random() * 28) + 4; // 4px to 32px
                    bar.style.height = `${randomPct}px`;
                }
            });
        }

        // Sound visualization trigger
        function cycleEqualizer(play) {
            if (play) {
                if (!eqAnimInterval) {
                    eqAnimInterval = setInterval(updateEqualizerAnimation, 120);
                }
            } else {
                if (eqAnimInterval) {
                    clearInterval(eqAnimInterval);
                    eqAnimInterval = null;
                }
                setTimeout(() => {
                    if (audioplayer.paused) {
                        const bars = document.querySelectorAll('.eq-bar');
                        bars.forEach(bar => bar.style.height = '4px');
                    }
                }, 200);
            }
        }

        // Initialize queue and populate tracks from Input
        fileImporter.addEventListener('change', (event) => {
            const files = Array.from(event.target.files);
            if (!files.length) return;

            const duplicateCheckNames = trackQueue.map(item => item.name);

            files.forEach(file => {
                // Avoid files that already exist in current session
                if (!duplicateCheckNames.includes(file.name)) {
                    const localUrlBlob = URL.createObjectURL(file);
                    trackQueue.push({
                        id: Math.random().toString(36).substr(2, 9),
                        name: file.name,
                        cleanTitle: parseCleanTitle(file.name),
                        blobUrl: localUrlBlob,
                        fileObject: file,
                        formattedDuration: '--:--'
                    });
                }
            });

            // If nothing was playing, play the first added file from the batch
            const playFirstNow = (currentTrackIdx === -1 && trackQueue.length > 0);

            applyQueueAndRenderList();

            if (playFirstNow) {
                loadTrackAndInitialize(0);
            }
        });

        // Filter queue based on search bar entries
        function applyQueueAndRenderList() {
            const query = searchInput.value.trim().toLowerCase();
            if (query) {
                filteredQueue = trackQueue.filter(track => 
                    track.cleanTitle.toLowerCase().includes(query)
                );
            } else {
                filteredQueue = [...trackQueue];
            }

            renderTracklistUI();
        }

        // Trigger dynamic updates to text labels and play indicators
        function renderTracklistUI() {
            libCountBadge.innerHTML = `${trackQueue.length} track${trackQueue.length === 1 ? '' : 's'}`;

            if (trackQueue.length === 0) {
                // Return to clean empty state view
                emptyStateCapsule.style.display = 'flex';
                searchContainer.style.display = 'none';
                clearQueueAction.style.display = 'none';
                songsListWrapper.querySelectorAll('.song-row-item').forEach(el => el.remove());
                return;
            }

            // Hide empty instructions, expose helper features
            emptyStateCapsule.style.display = 'none';
            searchContainer.style.display = 'block';
            clearQueueAction.style.display = 'inline-block';

            // Remove existing row iterations (excluding the empty capsule layer)
            songsListWrapper.querySelectorAll('.song-row-item').forEach(el => el.remove());

            // Build list nodes gracefully
            filteredQueue.forEach((track, index) => {
                // Find actual alignment index inside core master array
                const masterQueueIdx = trackQueue.findIndex(master => master.id === track.id);
                const isPlaybackCurrent = (masterQueueIdx === currentTrackIdx);

                const songRow = document.createElement('div');
                songRow.className = `song-row-item ${isPlaybackCurrent ? 'current-active-row' : ''}`;
                
                // Clicking on a row instantly triggers playback
                songRow.addEventListener('click', (e) => {
                    // Check if click occurred on the delete button to prevent cross playing
                    if (e.target.closest('.track-delete-btn')) return;
                    loadTrackAndInitialize(masterQueueIdx);
                });

                const isPlaying = !audioplayer.paused;
                const animatedBarState = isPlaying ? 'media-playing-bar' : '';

                songRow.innerHTML = `
                    <div class="row-left-content">
                        <span class="sequential-index">${index + 1}</span>
                        <div class="active-sound-animation ${animatedBarState}">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        <div class="row-track-details">
                            <span class="row-track-title">${escapeHTML(track.cleanTitle)}</span>
                            <span class="row-track-meta">Local Audio Stream</span>
                        </div>
                    </div>
                    <div class="row-right-actions">
                        <span class="track-time-duration">${track.formattedDuration}</span>
                        <button class="track-delete-btn" data-id="${track.id}" title="Remove track">
                            <svg class="icon" style="width: 14px; height: 14px;" viewBox="0 0 24 24">
                                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                            </svg>
                        </button>
                    </div>
                `;

                songsListWrapper.appendChild(songRow);
            });

            // Attach Delete Listeners individually
            document.querySelectorAll('.track-delete-btn').forEach(delBtn => {
                delBtn.addEventListener('click', (e) => {
                    const uniqueId = delBtn.getAttribute('data-id');
                    removeTrackFromLibrary(uniqueId);
                });
            });
        }

        // Track Removal Mechanism
        function removeTrackFromLibrary(idNum) {
            const indexOfDeletion = trackQueue.findIndex(track => track.id === idNum);
            if (indexOfDeletion === -1) return;

            // Revoke standard blob resource to clean memory leak
            URL.revokeObjectURL(trackQueue[indexOfDeletion].blobUrl);

            trackQueue.splice(indexOfDeletion, 1);

            // Handle indices shift
            if (currentTrackIdx === indexOfDeletion) {
                // Currently playing item deleted. Clear playback or advance
                if (trackQueue.length > 0) {
                    const nextAvailable = indexOfDeletion < trackQueue.length ? indexOfDeletion : 0;
                    loadTrackAndInitialize(nextAvailable);
                } else {
                    resetCorePlayerState();
                }
            } else if (currentTrackIdx > indexOfDeletion) {
                currentTrackIdx--;
            }

            applyQueueAndRenderList();
        }

        // Reset player UI to blank default
        function resetCorePlayerState() {
            audioplayer.pause();
            currentTrackIdx = -1;
            audioplayer.src = "";
            displayTitle.innerHTML = "No track loaded";
            displayTitle.classList.remove('scroll-marquee');
            displayArtist.innerHTML = "Import local tracks below";
            currentTimestampText.innerHTML = "00:00";
            totalDurationText.innerHTML = "00:00";
            trackerProgress.style.width = "0%";
            vinylArt.classList.remove('vinyl-playing');
            cycleEqualizer(false);
            updatePlayPauseButtonUI(false);
        }

        // Clear music queue action
        clearQueueAction.addEventListener('click', () => {
            trackQueue.forEach(t => URL.revokeObjectURL(t.blobUrl));
            trackQueue = [];
            resetCorePlayerState();
            applyQueueAndRenderList();
        });

        // Filter matching tracks based on key entry inputs
        searchInput.addEventListener('input', applyQueueAndRenderList);

        // Core Track Initializer
        function loadTrackAndInitialize(masterIndex) {
            if (masterIndex < 0 || masterIndex >= trackQueue.length) return;

            currentTrackIdx = masterIndex;
            const activeTrack = trackQueue[currentTrackIdx];

            audioplayer.src = activeTrack.blobUrl;
            audioplayer.load();

            // Render Title metadata
            displayTitle.innerHTML = escapeHTML(activeTrack.cleanTitle);
            displayArtist.innerHTML = "Local File — " + structureFileSize(activeTrack.fileObject.size);

            // Detect title length and set scrolling marquee style if too long
            setTimeout(() => {
                const titleLengthLimit = 22;
                if (activeTrack.cleanTitle.length > titleLengthLimit) {
                    displayTitle.classList.add('scroll-marquee');
                } else {
                    displayTitle.classList.remove('scroll-marquee');
                }
            }, 60);

            // Play track audio
            audioplayer.play()
                .then(() => {
                    updatePlayPauseButtonUI(true);
                    vinylArt.classList.add('vinyl-playing');
                    cycleEqualizer(true);
                })
                .catch((err) => {
                    console.log("Audio play gesture pending or stream failure: ", err);
                    updatePlayPauseButtonUI(false);
                    vinylArt.classList.remove('vinyl-playing');
                    cycleEqualizer(false);
                });

            applyQueueAndRenderList();
        }

        // Structure clean helper for file storage sizes
        function structureFileSize(sizeInBytes) {
            if (!sizeInBytes) return "0 B";
            const kb = sizeInBytes / 1024;
            const mb = kb / 1024;
            if (mb >= 1) return mb.toFixed(2) + " MB";
            return kb.toFixed(1) + " KB";
        }

        // Update customized master play pause button styling
        function updatePlayPauseButtonUI(isPlaying) {
            if (isPlaying) {
                playSymbol.style.display = 'none';
                pauseSymbol.style.display = 'block';
                playPauseBtn.setAttribute('title', 'Pause');
            } else {
                playSymbol.style.display = 'block';
                pauseSymbol.style.display = 'none';
                playPauseBtn.setAttribute('title', 'Play');
            }
        }

        // Master Click Action on Play/Pause Button
        playPauseBtn.addEventListener('click', () => {
            if (currentTrackIdx === -1) {
                if (trackQueue.length > 0) {
                    loadTrackAndInitialize(0);
                }
                return;
            }

            if (audioplayer.paused) {
                audioplayer.play()
                    .then(() => {
                        updatePlayPauseButtonUI(true);
                        vinylArt.classList.add('vinyl-playing');
                        cycleEqualizer(true);
                        // Refresh tracklist dynamic state indicators
                        applyQueueAndRenderList();
                    })
                    .catch(err => console.log("Fail toggle play state: ", err));
            } else {
                audioplayer.pause();
                updatePlayPauseButtonUI(false);
                vinylArt.classList.remove('vinyl-playing');
                cycleEqualizer(false);
                applyQueueAndRenderList();
            }
        });

        // Skip to Next song logic
        nextBtn.addEventListener('click', navigateNextTrack);

        function navigateNextTrack() {
            if (trackQueue.length === 0) return;

            if (isShuffleOn) {
                const randomIdx = Math.floor(Math.random() * trackQueue.length);
                loadTrackAndInitialize(randomIdx);
            } else {
                let nextIdx = currentTrackIdx + 1;
                if (nextIdx >= trackQueue.length) {
                    nextIdx = 0; // Wrap back to starting song
                }
                loadTrackAndInitialize(nextIdx);
            }
        }

        // Skip to Previous song logic
        prevBtn.addEventListener('click', () => {
            if (trackQueue.length === 0) return;

            // If audio has elapsed past 3 seconds, reset track timing instead of backing up
            if (audioplayer.currentTime > 3) {
                audioplayer.currentTime = 0;
                return;
            }

            if (isShuffleOn) {
                const randomIdx = Math.floor(Math.random() * trackQueue.length);
                loadTrackAndInitialize(randomIdx);
            } else {
                let prevIdx = currentTrackIdx - 1;
                if (prevIdx < 0) {
                    prevIdx = trackQueue.length - 1; // Wrap around to end
                }
                loadTrackAndInitialize(prevIdx);
            }
        });

        // Shuffle state toggles
        shuffleBtn.addEventListener('click', () => {
            isShuffleOn = !isShuffleOn;
            if (isShuffleOn) {
                shuffleBtn.classList.add('active-toggle');
                shuffleBtn.setAttribute('title', 'Shuffle (On)');
            } else {
                shuffleBtn.classList.remove('active-toggle');
                shuffleBtn.setAttribute('title', 'Shuffle (Off)');
            }
        });

        // Repeat mode state rotations
        repeatBtn.addEventListener('click', () => {
            repeatModeState = (repeatModeState + 1) % 3;
            if (repeatModeState === 0) {
                repeatBtn.classList.remove('active-toggle');
                repeatBtn.querySelector('path').style.fill = 'currentColor';
                repeatBtn.setAttribute('title', 'Repeat (Off)');
            } else if (repeatModeState === 1) {
                // Repeat All tracks loop option activated
                repeatBtn.classList.add('active-toggle');
                repeatBtn.setAttribute('title', 'Repeat Queue');
            } else {
                // Repeat Single track loop option activated
                repeatBtn.setAttribute('title', 'Repeat Track');
                // Replace path color slightly or indicator
            }
            updateRepeatButtonVisual();
        });

        function updateRepeatButtonVisual() {
            if (repeatModeState === 2) {
                // Set color or subtle background to show 1 active loop difference
                repeatBtn.style.color = 'var(--accent-violet)';
            } else {
                repeatBtn.style.color = '';
            }
        }

        // Track End transitions automatically
        audioplayer.addEventListener('ended', () => {
            if (repeatModeState === 2) {
                // Single track repeat mode loop
                audioplayer.currentTime = 0;
                audioplayer.play().catch(err => console.log("Loop failure: ", err));
            } else if (repeatModeState === 1) {
                // Standard Queue repeat or linear advancement
                navigateNextTrack();
            } else {
                // Linear Queue stop checks
                const isSequenceEnd = (currentTrackIdx === trackQueue.length - 1);
                if (isSequenceEnd) {
                    resetCorePlayerState();
                } else {
                    navigateNextTrack();
                }
            }
        });

        // Handle Audio Duration Meta Loader updates
        audioplayer.addEventListener('durationchange', () => {
            const curTrack = trackQueue[currentTrackIdx];
            if (curTrack && curTrack.formattedDuration === '--:--') {
                curTrack.formattedDuration = structureTimeStrings(audioplayer.duration);
                applyQueueAndRenderList();
            }
            totalDurationText.innerHTML = structureTimeStrings(audioplayer.duration);
        });

        // Update Progress Tracker bar as audio executes
        audioplayer.addEventListener('timeupdate', () => {
            if (isNaN(audioplayer.duration)) return;
            
            const currentSecs = audioplayer.currentTime;
            const durationTotal = audioplayer.duration;
            const percentageElapsed = (currentSecs / durationTotal) * 100;

            trackerProgress.style.width = `${percentageElapsed}%`;
            currentTimestampText.innerHTML = structureTimeStrings(currentSecs);
        });

        // Seek Bar click-drag track skip handling
        function performSeekAction(event) {
            if (currentTrackIdx === -1 || isNaN(audioplayer.duration)) return;

            const boxWidth = trackerSlider.clientWidth;
            const clickX = event.offsetX;
            const newPct = clickX / boxWidth;
            
            trackerProgress.style.width = `${newPct * 100}%`;
            audioplayer.currentTime = newPct * audioplayer.duration;
        }

        trackerSlider.addEventListener('mousedown', (e) => {
            performSeekAction(e);
            
            const movingSeekHandler = (moveEvent) => {
                // Calculate coordinate shifts bounding layout limits
                let relativeX = moveEvent.pageX - trackerSlider.getBoundingClientRect().left;
                if (relativeX < 0) relativeX = 0;
                if (relativeX > trackerSlider.clientWidth) relativeX = trackerSlider.clientWidth;
                
                const percentage = relativeX / trackerSlider.clientWidth;
                trackerProgress.style.width = `${percentage * 100}%`;
                audioplayer.currentTime = percentage * audioplayer.duration;
            };

            document.addEventListener('mousemove', movingSeekHandler);
            document.addEventListener('mouseup', () => {
                document.removeEventListener('mousemove', movingSeekHandler);
            }, { once: true });
        });

        // Volume Mute action click
        volMuteBtn.addEventListener('click', () => {
            isVolumeMuted = !isVolumeMuted;
            audioplayer.muted = isVolumeMuted;

            if (isVolumeMuted) {
                volHighSvg.style.display = 'none';
                volMuteSvg.style.display = 'block';
                volProgressBar.style.width = '0%';
                volMuteBtn.setAttribute('title', 'Unmute Volume');
            } else {
                volHighSvg.style.display = 'block';
                volMuteSvg.style.display = 'none';
                volProgressBar.style.width = `${lastCachedVolume * 100}%`;
                volMuteBtn.setAttribute('title', 'Mute Volume');
            }
        });

        // Volume slider dragging interface controls
        function processVolumeLevelSetter(event) {
            const widthBound = volSlider.clientWidth;
            let clickCoordX = event.offsetX;
            if (clickCoordX < 0) clickCoordX = 0;
            if (clickCoordX > widthBound) clickCoordX = widthBound;

            const soundPct = clickCoordX / widthBound;
            
            volProgressBar.style.width = `${soundPct * 100}%`;
            audioplayer.volume = soundPct;
            lastCachedVolume = soundPct;

            // Remove mute class indicators if modified manually
            if (isVolumeMuted && soundPct > 0) {
                isVolumeMuted = false;
                audioplayer.muted = false;
                volHighSvg.style.display = 'block';
                volMuteSvg.style.display = 'none';
                volMuteBtn.setAttribute('title', 'Mute Volume');
            }
        }

        volSlider.addEventListener('mousedown', (e) => {
            processVolumeLevelSetter(e);

            const movingVolumeHandler = (moveEvent) => {
                let rectBounds = volSlider.getBoundingClientRect();
                let relativeX = moveEvent.pageX - rectBounds.left;
                if (relativeX < 0) relativeX = 0;
                if (relativeX > volSlider.clientWidth) relativeX = volSlider.clientWidth;

                const soundPct = relativeX / volSlider.clientWidth;
                volProgressBar.style.width = `${soundPct * 100}%`;
                audioplayer.volume = soundPct;
                lastCachedVolume = soundPct;

                if (isVolumeMuted && soundPct > 0) {
                    isVolumeMuted = false;
                    audioplayer.muted = false;
                    volHighSvg.style.display = 'block';
                    volMuteSvg.style.display = 'none';
                    volMuteBtn.setAttribute('title', 'Mute Volume');
                }
            };

            document.addEventListener('mousemove', movingVolumeHandler);
            document.addEventListener('mouseup', () => {
                document.removeEventListener('mousemove', movingVolumeHandler);
            }, { once: true });
        });

        // Escape dangerous HTML strings safely to prevent XSS on client import filenames
        // Use exact unique namespaces to allow simultaneous usage checks
        function escapeHTML(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

    </script>
</body>
</html>
